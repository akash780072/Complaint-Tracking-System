{% extends "base.html" %}

{% block title %}Admin Login - DCTS 2025{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 400px; margin-top: 5rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <svg style="color: var(--primary);" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
    </div>
    <h2 class="form-title" style="margin-bottom: 1.5rem;">Admin Login</h2>
    
    {% if error %}
        <div style="background-color: #FEE2E2; color: #DC2626; padding: 0.75rem; border-radius: var(--radius); margin-bottom: 1.5rem; text-align: center; font-size: 0.9rem;">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required autofocus>
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--gray);">
        Default Credentials: Alpha / Alpha@12345
    </p>
</div>
{% endblock %}
